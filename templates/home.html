<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% if number > 20 %}
    <h1>{{number}} is greater than 20</h1>
    {% elif number > 10 %}
    <h1>{{number}} is greater than 10 but less than 20</h1>
    {% else %}
    <h1>{{number}} is less than or equal to 10</h1>
    {% endif %}

    {% for item in data %}
        <h2>{{item.key}}</h2>
    {% endfor %}
</body>
</html>
